<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTC Ticker Fullscreen - Coinbase</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background: #000000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* mierne zväčšenie */
.widget-wrapper {
    transform: scale(3);
    transform-origin: center center;
}
</style>
</head>

<body>

<div class="widget-wrapper">
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" 
        src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js"
        async>
        {
          "symbol": "COINBASE:BTCUSD",
          "colorTheme": "dark",
          "isTransparent": false,
          "locale": "en",
          "width": 600
        }
        </script>
        <div class="tradingview-widget-copyright">
            <a href="https://www.tradingview.com/symbols/ETHUSD/?exchange=COINBASE" 
               rel="noopener nofollow" target="_blank">
               <span class="blue-text">Bitcoin price</span>
            </a><span class="trademark"> by TradingView</span>
        </div>
    </div>
</div>

</body>
</html>
